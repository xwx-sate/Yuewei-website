<h2>首页入口页 - 布局方案</h2>
<p class="subtitle">请选择您偏好的首页布局风格</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>左右分栏布局（推荐）</h3>
      <p>页面主体分为左右等宽两栏，两栏分别垂直居中放置按钮，视觉平衡，符合您的需求描述</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>上下堆叠布局</h3>
      <p>两个按钮上下排列，更适合移动端单手操作，但视觉冲击力稍弱</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>卡片式布局</h3>
      <p>两个大型卡片式按钮，每个卡片包含图标和文字，更具视觉吸引力</p>
    </div>
  </div>
</div>

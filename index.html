<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-zh="YUEWEI Lemos Sourcing" data-en="YUEWEI Lemos Sourcing" data-mx="YUEWEI Lemos Sourcing">YUEWEI Lemos Sourcing</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a1628 0%, #1a365d 50%, #0d2137 100%);
      overflow: hidden;
      position: relative;
    }

    /* 背景动态网格 */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(rgba(74, 144, 164, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 144, 164, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* 背景光晕 */
    .glow-1 {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(74, 144, 164, 0.15) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      animation: float1 8s ease-in-out infinite;
    }

    .glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(44, 95, 124, 0.2) 0%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, 30px) scale(1.1); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
      max-width: 1200px;
      width: 100%;
    }

    /* 主标题 */
    .main-title {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 20px;
      letter-spacing: 4px;
      text-shadow: 0 4px 30px rgba(74, 144, 164, 0.3);
      animation: fadeInDown 1s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 副标题 */
    .sub-title {
      font-size: clamp(1rem, 2vw, 1.3rem);
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 60px;
      letter-spacing: 2px;
      animation: fadeInUp 1s ease-out 0.3s both;
    }

    .sub-title span {
      display: inline-block;
      margin: 0 15px;
      position: relative;
    }

    .sub-title span:not(:last-child)::after {
      content: '|';
      position: absolute;
      right: -20px;
      color: rgba(74, 144, 164, 0.5);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 按钮容器 */
    .buttons-container {
      display: flex;
      justify-content: center;
      gap: 60px;
      flex-wrap: wrap;
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    /* 大按钮样式 */
    .big-btn {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
      cursor: pointer;
    }

    /* 左侧按钮 - 供应链合作伙伴 */
    .btn-supply {
      background: linear-gradient(145deg, #1e3a5f 0%, #2c5f7c 50%, #1a4a6e 100%);
      color: #ffffff;
      border: 2px solid rgba(74, 144, 164, 0.3);
      box-shadow:
        0 10px 40px rgba(44, 95, 124, 0.4),
        0 0 0 1px rgba(74, 144, 164, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .btn-supply::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(74, 144, 164, 0.2),
        transparent
      );
      transition: left 0.5s;
    }

    .btn-supply:hover::before {
      left: 100%;
    }

    .btn-supply:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow:
        0 20px 60px rgba(44, 95, 124, 0.6),
        0 0 60px rgba(74, 144, 164, 0.3),
        0 0 0 2px rgba(74, 144, 164, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border-color: rgba(74, 144, 164, 0.6);
    }

    .btn-supply .btn-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.9;
      transition: all 0.4s;
    }

    .btn-supply:hover .btn-icon {
      transform: scale(1.1);
      opacity: 1;
    }

    /* 右侧按钮 - 品牌客户 */
    .btn-brand {
      background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 50%, #e2e8f0 100%);
      color: #1a365d;
      border: 2px solid rgba(74, 144, 164, 0.2);
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .btn-brand::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(74, 144, 164, 0.15),
        transparent
      );
      transition: left 0.5s;
    }

    .btn-brand:hover::before {
      left: 100%;
    }

    .btn-brand:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.25),
        0 0 60px rgba(74, 144, 164, 0.2),
        0 0 0 2px rgba(74, 144, 164, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 1);
      border-color: rgba(74, 144, 164, 0.5);
    }

    .btn-brand .btn-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.8;
      transition: all 0.4s;
    }

    .btn-brand:hover .btn-icon {
      transform: scale(1.1);
      opacity: 1;
    }

    /* 按钮文字 */
    .btn-text {
      position: relative;
      z-index: 2;
    }

    /* 按钮光晕效果 */
    .btn-glow {
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background: radial-gradient(circle, rgba(74, 144, 164, 0.15) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .big-btn:hover .btn-glow {
      opacity: 1;
    }

    /* 底部装饰线 */
    .bottom-line {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(74, 144, 164, 0.5), transparent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; width: 100px; }
      50% { opacity: 1; width: 150px; }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .buttons-container {
        gap: 40px;
      }

      .big-btn {
        width: 240px;
        height: 240px;
        font-size: 1.2rem;
      }

      .big-btn .btn-icon {
        width: 60px;
        height: 60px;
        margin-bottom: 15px;
      }

      .sub-title span {
        display: block;
        margin: 10px 0;
      }

      .sub-title span::after {
        display: none;
      }
    }
  </style>
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- 背景效果 -->
  <div class="bg-grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- 主内容 -->
  <div class="container">
    <!-- 主标题 -->
    <h1 class="main-title" data-zh="Lemos Sourcing" data-en="Lemos Sourcing" data-mx="Lemos Sourcing">Lemos Sourcing</h1>

    <!-- 副标题 -->
    <p class="sub-title">
      <span data-zh="链通全球，货通天下" data-en="Linking the World, Delivering Excellence" data-mx="Conectando el Mundo, Entregando Excelencia">链通全球，货通天下</span>
      <span data-zh="从世界工厂，到全球供应链" data-en="From World Factory to Global Supply Chain" data-mx="De Fábrica Mundial a Cadena de Suministro Global">从世界工厂，到全球供应链</span>
      <span data-zh="一站式出海解决方案" data-en="One-Stop Global Solution" data-mx="Solución Global Todo en Uno">一站式出海解决方案</span>
    </p>

    <!-- 两个大按钮 -->
    <div class="buttons-container">
      <!-- 左侧按钮：供应链合作伙伴 -->
      <a href="index-brand.html" class="big-btn btn-supply">
        <div class="btn-glow"></div>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        <span class="btn-text" data-zh="供应链合作伙伴" data-en="Supply Chain Partner" data-mx="Socio de Cadena de Suministro">供应链合作伙伴</span>
      </a>

      <!-- 右侧按钮：品牌客户 -->
      <a href="detail.html" class="big-btn btn-brand">
        <div class="btn-glow"></div>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="5"/>
          <path d="M20 21a8 8 0 10-16 0"/>
          <path d="M12 13v8"/>
        </svg>
        <span class="btn-text" data-zh="品牌客户" data-en="Brand Customer" data-mx="Cliente de Marca">品牌客户</span>
      </a>
    </div>
  </div>

  <!-- 底部装饰 -->
  <div class="bottom-line"></div>

  <script src="js/interactions.js"></script>
  <script src="js/language.js"></script>
</body>
</html>
